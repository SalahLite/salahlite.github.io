  <style>
    [x-cloak] { display: none !important; }
    html { scroll-behavior: smooth; }
    .bg-emerald-dark { background-color: #104937; }
    .text-emerald-dark { color: #104937; }
    .bg-gold { background-color: #F2C94C; }
    .text-gold { color: #F2C94C; }
    .border-gold { border-color: #F2C94C; }

    /* === Buttons === */
    .btn-gold {
      background-color: #F2C94C;
      color: #104937;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-gold::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-gold:hover::before { left: 100%; }
    .btn-gold:hover {
      background-color: #d4a832;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(242, 201, 76, 0.4);
    }
    .btn-gold:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(242, 201, 76, 0.3); }

    /* === Feature Cards === */
    .feature-card {
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1.5rem;
      background: white;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #104937, #F2C94C, #104937);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .feature-card:hover::before { transform: scaleX(1); }
    .feature-card:hover {
      border-color: #F2C94C;
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(16, 73, 55, 0.12);
    }
    .feature-card:hover .feature-icon {
      transform: scale(1.1) rotate(-5deg);
      background-color: #F2C94C;
    }
    .feature-card:hover .feature-icon svg {
      color: #104937;
      transform: scale(1.1);
    }

    .feature-icon {
      width: 48px; height: 48px;
      border-radius: 0.5rem;
      background-color: #104937;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .feature-icon svg {
      width: 24px; height: 24px;
      color: #F2C94C;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* === Language Cards === */
    .lang-card {
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
    }
    .lang-card:hover {
      transform: translateY(-4px) scale(1.03);
      border-color: #F2C94C;
      box-shadow: 0 8px 24px rgba(242, 201, 76, 0.2);
    }
    .lang-card:hover .lang-code { color: #F2C94C; }
    .lang-card.rtl-card { background-color: #104937; color: white; border-color: #104937; }
    .lang-card.rtl-card:hover { background-color: #0d3d2e; box-shadow: 0 8px 24px rgba(16, 73, 55, 0.3); }

    .lang-code { font-weight: 700; font-size: 1.5rem; transition: color 0.3s; }

    /* === Screenshot Cards === */
    .screenshot-card { position: relative; overflow: hidden; border-radius: 0.75rem; }
    .screenshot-card img {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .screenshot-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 0.75rem;
      border: 2px solid transparent;
      transition: border-color 0.3s;
      pointer-events: none;
    }
    .screenshot-card:hover::after { border-color: #F2C94C; }
    .screenshot-card:hover img {
      transform: scale(1.03);
      box-shadow: 0 16px 48px rgba(16, 73, 55, 0.2);
    }

    /* === Widget Image === */
    .widget-image {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .widget-image:hover {
      transform: scale(1.02) rotate(-1deg);
      box-shadow: 0 20px 60px rgba(16, 73, 55, 0.25);
    }

    /* === Scroll Animations === */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* === Navbar === */
    .nav-logo { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-logo:hover { transform: rotate(10deg) scale(1.1); }

    /* === RTL === */
    [dir="rtl"] .rtl-flip { transform: scaleX(-1); }

    /* === Check list items === */
    .check-item {
      transition: transform 0.2s;
    }
    .check-item:hover { transform: translateX(4px); }
    [dir="rtl"] .check-item:hover { transform: translateX(-4px); }
  </style>

  <script>
    function app() {
      return {
        t(key) {
          const store = this.$store && this.$store.lang;
          const current = store ? store.current : 'en';
          const val = this._resolve(current, key);
          return val || this._resolve('en', key) || key;
        },
        _resolve(lang, key) {
          const keys = key.split('.');
          let val = translations[lang];
          for (const k of keys) {
            if (val === undefined) return undefined;
            const match = k.match(/^(\w+)\[(\d+)\]$/);
            if (match) {
              val = val?.[match[1]]?.[parseInt(match[2])];
            } else {
              val = val?.[k];
            }
          }
          return val;
        },
        lang() {
          const store = this.$store && this.$store.lang;
          const current = store ? store.current : 'en';
          return translations[current] || translations.en;
        },
        changeLang(code) {
          this.$store.lang.current = code;
          localStorage.setItem('salah-lite-lang', code);
          document.documentElement.lang = code;
          document.documentElement.dir = this.lang().dir;
        }
      }
    }

    document.addEventListener('alpine:init', () => {
      Alpine.store('lang', {
        current: 'en'
      });

      // Detect language: URL param > localStorage > navigator.language > EN
      const params = new URLSearchParams(window.location.search);
      const urlLang = params.get('lang');
      const savedLang = localStorage.getItem('salah-lite-lang');
      const browserLang = navigator.language.split('-')[0];
      
      let initial = 'en';
      if (urlLang && translations[urlLang]) initial = urlLang;
      else if (savedLang && translations[savedLang]) initial = savedLang;
      else if (['en', 'zh', 'ar'].includes(browserLang)) initial = browserLang;
      
      Alpine.store('lang', { current: initial });
      document.documentElement.dir = translations[initial].dir;
    });
  </script>
